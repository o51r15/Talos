# Docker Backup Manager — Configuration
# All paths should be absolute. When running as a container, use mount paths.

# ── Storage ──────────────────────────────────────────────────────────────────
backup_dest: /backups
restore_snapshot_dir: /backups/restore_snapshot

# Directory on the host where container data folders live (used by CLI scan)
base_data_dir: /docker

# Paths to scan for compose files if docker inspect labels are missing
compose_scan_paths:
  - /docker
  - /opt/docker
  - /home

# ── Retention ─────────────────────────────────────────────────────────────────
retention:
  keep_last: 7          # keep the N most recent backups per container per type
  max_age_days: 30      # also delete anything older than this (0 = disabled)

# ── Restore ───────────────────────────────────────────────────────────────────
# Whether to delete the safety snapshot after a successful restore
purge_snapshot_on_success: false

# ── Self-identification ───────────────────────────────────────────────────────
# Set this to the container name of the backup manager itself so it skips
# itself during backup/restore operations. Leave empty when running as a script.
self_container_name: ""

# ── Web Server ────────────────────────────────────────────────────────────────
web_host: "0.0.0.0"
web_port: 8000

# ── Authentication (stub — not active in initial release) ─────────────────────
auth:
  enabled: false
  secret_key: "changeme-replace-before-enabling"
  username: "admin"
  password_hash: ""   # bcrypt hash — populated when auth is enabled
