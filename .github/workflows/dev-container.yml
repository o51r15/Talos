name: Build & Publish Dev Container

on:
  push:
    branches:
      - master
      - dev
      - 'feature/**'
  workflow_dispatch:   # allow manual trigger from Actions tab

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # o51r15/talos

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Buildx (multi-platform builder) ─────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Login to GitHub Container Registry ──────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Metadata / tags ──────────────────────────────────────────────────────
      # Produces tags like:
      #   ghcr.io/o51r15/talos:master          (branch name)
      #   ghcr.io/o51r15/talos:master-a1b2c3d  (branch + short SHA)
      #   ghcr.io/o51r15/talos:latest          (master only)
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=${{ github.ref_name }}-,format=short
            type=raw,value=latest,enable=${{ github.ref_name == 'master' }}

      # ── Build & push ─────────────────────────────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64   # covers x86 servers and Raspberry Pi / ARM NAS
          cache-from: type=gha                  # GitHub Actions layer cache
          cache-to:   type=gha,mode=max

      # ── Summary ──────────────────────────────────────────────────────────────
      - name: Write job summary
        run: |
          echo "## ✓ Image published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags pushed:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pull command:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
