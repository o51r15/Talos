name: Build & Publish Dev Container

on:
  push:
    branches:
      - master
      - dev
      - 'feature/**'
  pull_request:
    branches:
      - master
  workflow_dispatch:   # allow manual trigger from Actions tab

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # o51r15/talos

jobs:
  # ── Test gate ────────────────────────────────────────────────────────────────
  # Runs on every push and PR. The image build depends on this passing, so a
  # red test suite means no image is ever built or published.
  test:
    name: Test & lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install pyflakes

      - name: Lint (pyflakes)
        run: pyflakes core/ api/ cli/ main.py

      - name: Run tests
        run: pytest -v

      - name: Test summary
        if: always()
        run: |
          echo "## Test & lint" >> $GITHUB_STEP_SUMMARY
          echo "Job status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  # ── Build & push ─────────────────────────────────────────────────────────────
  # Only runs after `test` succeeds, and never on pull_request events
  # (PRs test only — no publishing from a fork or feature PR).
  build-and-push:
    name: Build & push image
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Produces tags like:
      #   ghcr.io/o51r15/talos:master          (branch name)
      #   ghcr.io/o51r15/talos:master-a1b2c3d  (branch + short SHA)
      #   ghcr.io/o51r15/talos:latest          (master only)
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=${{ github.ref_name }}-,format=short
            type=raw,value=latest,enable=${{ github.ref_name == 'master' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64   # x86 servers and ARM (Pi / ARM NAS)
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Write job summary
        run: |
          echo "## ✓ Image published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags pushed:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pull command:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
